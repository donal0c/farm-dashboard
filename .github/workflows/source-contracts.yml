name: Source contracts

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * 3"

permissions:
  contents: read

concurrency:
  group: source-contracts
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check:sources
